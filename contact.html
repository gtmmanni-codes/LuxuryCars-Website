<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->

<header>

    <h1>Luxury <span>Cars</span></h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Cars</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<!-- CONTACT SECTION -->

<section class="content">

    <h2>Contact <span>Us</span></h2>

    <!-- CONTACT FORM -->

    <form id="contactForm">

        <input type="text" placeholder="Your Name" required>

        <input type="email" placeholder="Your Email" required>

        <textarea placeholder="Your Message" required></textarea>

        <button type="submit">Send</button>

    </form>

    <br><br><br>

    <!-- LOCATION -->

    <h2>Our <span>Location</span></h2>

    <!-- GOOGLE MAP -->

    <iframe
        src="https://www.google.com/maps?q=7719+Boulevard+de+l'Acadie,+Montreal,+QC&output=embed"
        width="100%"
        height="450"
        style="border:0;"
        allowfullscreen=""
        loading="lazy">
    </iframe>

</section>

<!-- FOOTER -->

<footer>

    <p>© 2026 Luxury Cars. All Rights Reserved.</p>

    <div class="socials">

        <a href="https://facebook.com" target="_blank">Facebook</a>

        <a href="https://instagram.com" target="_blank">Instagram</a>

        <a href="https://youtube.com" target="_blank">YouTube</a>

    </div>

</footer>

<!-- JAVASCRIPT ALERT -->

<script>

document.getElementById("contactForm").addEventListener("submit", function(event){

    event.preventDefault();

    alert("Your contact form has been sent successfully!");

    this.reset();

});

</script>

</body>
</html>
